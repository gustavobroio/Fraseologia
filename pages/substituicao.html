<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraseologia - Substituição de Computador/periféricos</title>

  <link rel="icon" type="image/x-icon" href="../assets/images/serasa_favicon.ico">
  <link rel="stylesheet" href="../css/style.css">

  <style>
    /* Ajuste para campos de texto ocuparem toda a largura */
    .form-group.full-width {
      grid-column: span 2;
    }
  </style>
</head>

<body>
<div class="container">

  <!-- HEADER (topo + menu) carregado dinamicamente -->
  <div id="header-placeholder"></div>

  <!-- CONTEÚDO ESPECÍFICO DA PÁGINA -->
  <div class="card">
    <h1>Substituição de Computador/periféricos</h1>

    <p>Preencha todos os campos e clique em "Gerar Log".</p>
    <br>
    <!-- <div class="dica">
      ⚠️ Para substituição de equipamento, abra a solicitação AD-HOC antes de registrar o log.
    </div>
    <hr> -->

    <div class="form-grid">
      <div class="form-group">
        <label>🔢 Número do chamado</label>
        <input type="text" id="chamado" placeholder="Ex: INC123456">
      </div>
      <div class="form-group">
        <label>👤 Nome do colaborador</label>
        <input type="text" id="colaborador" placeholder="Nome completo">
      </div>
      <div class="form-group">
        <label>🔑 Login</label>
        <input type="text" id="login" placeholder="Login de rede">
      </div>
      <div class="form-group">
        <label>📧 E-Mail</label>
        <input type="email" id="email" placeholder="email@empresa.com">
      </div>
      <div class="form-group">
        <label>📍 Localidade padrão</label>
        <input type="text" id="localidade" placeholder="Andar, sala, etc.">
      </div>
      <div class="form-group">
        <label>🏢 BU</label>
        <input type="text" id="bu" placeholder="Unidade de negócio">
      </div>
      <div class="form-group">
        <label>💰 Centro de custo</label>
        <input type="text" id="centroCusto" placeholder="Centro de custo">
      </div>
      <div class="form-group">
        <label>🖥️ Dados do equipamento/periférico</label>
        <input type="text" id="dadosEquipamento" placeholder="Ex: Dell Optiplex 3080, Mouse, Teclado...">
      </div>
      <div class="form-group full-width">
        <label>📝 Descrição da solicitação/detalhamento</label>
        <textarea id="descricao" rows="3" placeholder="Descreva a solicitação em detalhes..."></textarea>
      </div>
      <div class="form-group full-width">
        <label>🔧 Análise técnica</label>
        <textarea id="analise" rows="3" placeholder="Análise técnica realizada..."></textarea>
      </div>
    </div>

    <div class="button-group">
      <button class="btn btn-primary" onclick="gerarLog()">📋 Gerar Log</button>
      <button class="btn btn-secondary" onclick="copiarLog()">📄 Copiar Log</button>
      <button class="btn btn-secondary" onclick="limparFormulario()">🗑️ Limpar</button>
    </div>
  </div>

  <!-- LOG -->
  <div class="card">
    <h3>📝 Log gerado (copie e cole no chamado)</h3>
    <div class="log-preview" id="Log">
      Clique em "Gerar Log" para começar
    </div>
  </div>

  <!-- FOOTER carregado dinamicamente -->
  <div id="footer-placeholder"></div>

</div>

<!-- DARK MODE -->
<button id="darkModeToggle"
        class="btn-toggle-dark-fixed"
        onclick="toggleDarkMode()">
  🌙 Dark Mode
</button>

<script src="../js/main.js"></script>
<script src="../js/components.js"></script>

<script>
window.gerarLog = function() {
  if (!validarCamposObrigatorios()) return;

  const chamado = document.getElementById('chamado').value.trim();
  const colaborador = document.getElementById('colaborador').value.trim();
  const login = document.getElementById('login').value.trim();
  const email = document.getElementById('email').value.trim();
  const localidade = document.getElementById('localidade').value.trim();
  const bu = document.getElementById('bu').value.trim();
  const centroCusto = document.getElementById('centroCusto').value.trim();
  const dadosEquipamento = document.getElementById('dadosEquipamento').value.trim();
  const descricao = document.getElementById('descricao').value.trim();
  const analise = document.getElementById('analise').value.trim();

  if (!chamado && !colaborador && !login && !email && !localidade && !bu && !centroCusto && !dadosEquipamento && !descricao && !analise) {
    mostrarToast('⚠️ Preencha pelo menos um campo antes de gerar o log!', 'warning');
    return;
  }

  let logTexto = '';
  if (chamado) logTexto += `Número do chamado: ${chamado}\n`;
  if (colaborador) logTexto += `Nome do colaborador: ${colaborador}\n`;
  if (login) logTexto += `Login: ${login}\n`;
  if (email) logTexto += `E-Mail: ${email}\n`;
  if (localidade) logTexto += `Localidade: ${localidade}\n`;
  if (bu) logTexto += `BU: ${bu}\n`;
  if (centroCusto) logTexto += `Centro de custo: ${centroCusto}\n`;
  if (dadosEquipamento) logTexto += `Dados do equipamento/periférico: ${dadosEquipamento}\n`;
  if (descricao) logTexto += `Descrição da solicitação/detalhamento: ${descricao}\n`;
  if (analise) logTexto += `Análise técnica: ${analise}`;

  document.getElementById('Log').innerHTML = logTexto.replace(/\n/g, '<br>');
  mostrarToast('✅ Log gerado!', 'success');
};
</script>

</body>
</html>
