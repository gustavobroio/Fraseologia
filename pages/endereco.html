  <title>Fraseologia - Endereço e CNPJ</title>

<script>
  (function() {
    const darkMode = localStorage.getItem('fraseologia-darkmode');
    if (darkMode === 'true') {
      document.body.classList.add('dark-mode');
    }
    // Sincroniza o botão assim que a página carregar
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('darkModeToggle');
      if (btn) {
        btn.textContent = darkMode === 'true' ? '☀️' : '🌙';
      }
    });
  })();
</script>

  <link rel="icon" type="image/x-icon" href="../assets/images/serasa_favicon.ico">

</head>

<script src="../js/components.js"></script>

<script>
window.gerarLog = function() {
  if (!validarCamposObrigatorios()) return;

  const localidade = document.getElementById('localidade').value;

  if (!localidade) {
    mostrarToast('⚠️ Selecione uma localidade!', 'warning');
    return;
  }

  document.getElementById('Log').innerHTML = localidade.replace(/\n/g, '<br>');
  mostrarToast('✅ Log gerado!', 'success');
};
</script>
