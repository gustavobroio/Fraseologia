<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraseologia - Início de Atendimento</title>

  <script>
  (function() {
    const darkMode = localStorage.getItem('fraseologia-darkmode');
    if (darkMode === 'true') {
      document.documentElement.classList.add('dark-mode');
    }
  })();
<script>
  (function() {
    const darkMode = localStorage.getItem('fraseologia-darkmode');
    if (darkMode === 'true') {
      document.body.classList.add('dark-mode');
    }
    // Sincroniza o botão assim que a página carregar
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('darkModeToggle');
      if (btn) {
        btn.textContent = darkMode === 'true' ? '☀️' : '🌙';
      }
    });
  })();
</script>

<body>
<div class="container">

  <!-- HEADER (topo + menu) carregado dinamicamente -->
  <div id="header-placeholder"></div>

  <!-- CONTEÚDO ESPECÍFICO DA PÁGINA -->
  <div class="card">
    <h1>Início de Atendimento</h1>
    <p>Inserir esta log ao iniciar o atendimento. Caso necessário, acrescente uma observação no campo abaixo.</p>
    <div class="dica">
      ⚠️ <strong>Importante:</strong> O status do chamado deve ser <strong>Em Andamento</strong>.
    </div>
    <hr>

    <div class="form-grid">
      <div class="form-group">
        <label>📝 Observação (opcional)</label>
        <textarea id="observacao" rows="4" placeholder="Acrescente informações adicionais se necessário..."></textarea>
      </div>
    </div>

    <div class="button-group">
      <button class="btn btn-primary" onclick="gerarLog()">📋 Gerar Log</button>
      <button class="btn btn-secondary" onclick="copiarLog()">📄 Copiar Log</button>
      <button class="btn btn-secondary" onclick="limparFormulario()">🗑️ Limpar</button>
    </div>
  </div>

  <!-- LOG -->
  <div class="card">
    <h3>📝 Log gerado (copie e cole no chamado)</h3>
    <div class="log-preview" id="Log">
      Clique em "Gerar Log" para começar
    </div>
  </div>

  <!-- FOOTER carregado dinamicamente -->
  <div id="footer-placeholder"></div>

</div>

<!-- DARK MODE -->
<button id="darkModeToggle"
        class="btn-toggle-dark-fixed"
        onclick="toggleDarkMode()">
  🌙 Dark Mode
</button>

<script src="../js/main.js"></script>
<script src="../js/components.js"></script>

<script>
window.gerarLog = function() {
  const obs = document.getElementById('observacao').value.trim();
  let logTexto = "Reconhecimento de chamado. Iniciando atendimento nesse momento";
  if (obs) {
    logTexto += "\n" + obs;
  }
  document.getElementById('Log').innerHTML = logTexto.replace(/\n/g, '<br>');
  mostrarToast('✅ Log gerado!', 'success');
};
</script>

</body>
</html>
